<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GodMarket - Продать скины</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .logo { text-align: center; font-size: 28px; font-weight: bold; margin: 30px 0 10px; color: #e94560; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .btn {
            display: block; width: 100%; padding: 14px; margin: 10px 0;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-align: center; transition: all 0.3s;
        }
        .btn-steam { background: #2a475e; color: #c7d5e0; }
        .btn-steam:hover { background: #3d6a8e; }
        .btn-sell-skin {
            background: #4ecca3; color: #1a1a2e; padding: 8px 16px;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
            font-size: 14px; transition: all 0.3s;
        }
        .btn-sell-skin:hover { background: #3dba8e; }
        .btn-sell-skin:disabled { background: #555; color: #999; cursor: not-allowed; }
        #inventory { margin-top: 20px; }
        .skin-item {
            background: #16213e; border-radius: 8px; padding: 12px;
            margin: 8px 0; display: flex; justify-content: space-between;
            align-items: center; border-left: 4px solid #e94560;
            gap: 10px;
        }
        .skin-info { flex: 1; }
        .skin-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .skin-market-price { color: #aaa; font-size: 12px; }
        .skin-our-price { font-weight: bold; color: #4ecca3; font-size: 14px; white-space: nowrap; }
        .status { text-align: center; padding: 20px; color: #aaa; }
        .error { color: #e94560; text-align: center; padding: 20px; }
        .success { color: #4ecca3; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="logo">🎮 GodMarket</div>
    <div class="subtitle">Продай скины быстро и выгодно</div>

    <button class="btn btn-steam" id="loginBtn" onclick="loginSteam()">🔐 Войти через Steam</button>

    <div id="inventory" style="display:none;">
        <div id="skinsList"></div>
    </div>

    <div id="status" class="status">Войди через Steam, чтобы увидеть свои скины</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#1a1a2e');

        let userSteamId = null;
        let priceCache = {};
        let descriptionsMap = {};

        function loginSteam() {
            const steamId = prompt('Введи свой Steam ID64 (временно):', '7656119XXXXXXXXXX');
            if (steamId && steamId.length === 17) {
                userSteamId = steamId;
                loadInventory();
            } else {
                alert('Неверный Steam ID. Должен быть 17 цифр.');
            }
        }

        async function getSkinPrice(marketHashName) {
            if (priceCache[marketHashName]) return priceCache[marketHashName];
            try {
                const response = await fetch(`/api/price?name=${encodeURIComponent(marketHashName)}`);
                const data = await response.json();
                if (data && data.lowest_price) {
                    const price = parseFloat(data.lowest_price.replace(/[^0-9,]/g, '').replace(',', '.'));
                    priceCache[marketHashName] = price;
                    return price;
                }
            } catch (e) {
                console.error('Ошибка получения цены:', e);
            }
            return null;
        }

        async function loadInventory() {
            document.getElementById('status').innerHTML = '⏳ Загружаю инвентарь...';
            document.getElementById('status').className = 'status';

            try {
                const response = await fetch(`/api/inventory?steamid=${userSteamId}`);
                const data = await response.json();

                if (data.success && data.assets && data.assets.length > 0) {
                    if (data.descriptions) {
                        data.descriptions.forEach(desc => {
                            const key = `${desc.classid}_${desc.instanceid}`;
                            descriptionsMap[key] = desc.market_hash_name;
                        });
                    }
                    await displayInventory(data.assets.slice(0, 10));
                    document.getElementById('status').style.display = 'none';
                } else {
                    document.getElementById('status').innerHTML = '❌ Инвентарь пуст или скрыт.';
                    document.getElementById('status').className = 'error';
                }
            } catch (e) {
                document.getElementById('status').innerHTML = '❌ Ошибка: ' + e.message;
                document.getElementById('status').className = 'error';
            }
        }

        async function displayInventory(assets) {
            document.getElementById('inventory').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';

            const container = document.getElementById('skinsList');
            container.innerHTML = '<div class="status">⏳ Загружаем цены...</div>';

            const skinItems = [];
            for (const item of assets) {
                const key = `${item.classid}_${item.instanceid}`;
                const marketHashName = descriptionsMap[key] || `Скин #${item.assetid}`;
                const marketPrice = await getSkinPrice(marketHashName);
                const ourPrice = marketPrice ? (marketPrice * 0.80).toFixed(2) : '—';
                const displayPrice = marketPrice ? `${marketPrice.toFixed(2)} ₽` : 'Нет цены';

                skinItems.push({
                    assetId: item.assetid,
                    name: marketHashName,
                    marketPrice: displayPrice,
                    ourPrice: ourPrice
                });
            }

            container.innerHTML = skinItems.map(item => `
                <div class="skin-item">
                    <div class="skin-info">
                        <div class="skin-name">🎨 ${item.name}</div>
                        <div class="skin-market-price">Рынок: ${item.marketPrice}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="skin-our-price">${item.ourPrice !== '—' ? item.ourPrice + ' ₽' : '—'}</div>
                        <button class="btn-sell-skin"
                                ${item.ourPrice === '—' ? 'disabled' : ''}
                                onclick="sellSkin('${item.assetId}', '${item.name}', ${item.ourPrice})">
                            💰 Продать
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function sellSkin(assetId, name, price) {
            tg.showPopup({
                title: 'Подтверждение продажи',
                message: `Продать "${name}" за ${price} ₽?`,
                buttons: [
                    {id: 'sell', type: 'ok', text: 'Продать'},
                    {type: 'cancel', text: 'Отмена'}
                ]
            }, function(btnId) {
                if (btnId === 'sell') {
                    tg.sendData(JSON.stringify({
                        action: 'sell',
                        steamId: userSteamId,
                        assetId: assetId,
                        name: name,
                        price: price
                    }));
                    document.getElementById('status').innerHTML = `✅ Заявка на продажу "${name}" принята!`;
                    document.getElementById('status').className = 'success';
                }
            });
        }
    </script>
</body>
</html>
