<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GodMarket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --accent: #e94560;
            --green: #4ecca3;
            --text: #eee;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            max-width: 420px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .logo { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
        .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .btn-steam { background: #2a475e; color: #c7d5e0; }
        .btn-logout { background: #333; color: #aaa; }
        .btn-refresh { background: #1e3a5f; color: #8ab4f8; }
        .btn-sell-all {
            background: var(--accent);
            color: white;
            font-size: 15px;
            padding: 14px;
            margin-top: 12px;
            position: sticky;
            bottom: 12px;
            box-shadow: 0 4px 20px rgba(233,69,96,0.4);
        }
        .btn-sell-all:disabled { background: #555; box-shadow: none; opacity: 0.6; }
        .user-info {
            text-align: center;
            color: var(--green);
            font-size: 11px;
            margin-bottom: 12px;
            background: rgba(78,204,163,0.1);
            padding: 6px;
            border-radius: 8px;
        }
        .skin-item {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--accent);
            transition: all 0.2s;
        }
        .skin-item.selected { border-left-color: var(--green); background: #1a2a2a; }
        .skin-info { flex: 1; min-width: 0; }
        .skin-name {
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .skin-count {
            color: var(--muted);
            font-size: 11px;
            margin-top: 2px;
        }
        .skin-our {
            font-weight: 700;
            color: var(--green);
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .qty-btn {
            background: #2a475e;
            color: white;
            border: none;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .qty-value {
            font-weight: 700;
            font-size: 14px;
            color: var(--green);
            min-width: 20px;
            text-align: center;
        }
        .status {
            text-align: center;
            padding: 30px 20px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎮 GodMarket</div>
        <div class="subtitle">Мгновенный выкуп скинов CS2</div>
    </div>

    <div id="userInfo" class="user-info" style="display:none;"></div>

    <div class="toolbar">
        <button class="btn btn-steam" id="loginBtn" onclick="login()">🔐 Steam</button>
        <button class="btn btn-logout" id="logoutBtn" style="display:none;" onclick="logout()">🚪</button>
        <button class="btn btn-refresh" id="refreshBtn" style="display:none;" onclick="refresh()">🔄</button>
    </div>

    <div id="inventory" style="display:none;">
        <div id="skinsList"></div>
        <button class="btn btn-sell-all" id="sellBtn" onclick="sellSelected()" disabled>
            💰 Продать выбранное (<span id="sellCount">0</span>)
        </button>
    </div>

    <div id="status" class="status">🔐 Войди через Steam</div>

    <script>
        const API = 'https://attendant-esophagus-expand.ngrok-free.dev';
        const H = { 'ngrok-skip-browser-warning': 'true' };

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f0f1a');
        tg.setBackgroundColor('#0f0f1a');

        let steamId = null;
        let groupedSkins = [];  // [{name, price, assetIds: [], selectedQty: 0}, ...]
        let priceCache = {};

        // Восстановление сессии
        const saved = localStorage.getItem('gm_steamid');
        if (saved) { steamId = saved; showUI(); loadInventory(); }

        function showUI() {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('refreshBtn').style.display = 'inline-block';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userInfo').innerHTML = '🟢 ' + steamId;
        }

        function hideUI() {
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('refreshBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('inventory').style.display = 'none';
        }

        function login() {
            const id = prompt('Steam ID64:', steamId || '');
            if (id && id.length === 17) {
                steamId = id;
                localStorage.setItem('gm_steamid', id);
                showUI();
                loadInventory();
            }
        }

        function logout() {
            localStorage.removeItem('gm_steamid');
            steamId = null;
            groupedSkins = [];
            priceCache = {};
            hideUI();
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').innerHTML = '🔐 Войди через Steam';
        }

        function refresh() { priceCache = {}; loadInventory(); }

        async function fetchPrice(name) {
            if (priceCache[name]) return priceCache[name];
            try {
                const r = await fetch(`${API}/api/price?name=${encodeURIComponent(name)}`, { headers: H });
                const d = await r.json();
                if (d.success) {
                    priceCache[name] = d.buy_price;
                    return d.buy_price;
                }
            } catch(e) {}
            return null;
        }

        async function loadInventory() {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').innerHTML = '⏳ Загрузка...';
            try {
                const r = await fetch(`${API}/api/inventory?steamid=${steamId}`, { headers: H });
                const d = await r.json();
                if (d.success && d.assets) {
                    // Карта описаний
                    const descMap = {};
                    if (d.descriptions) {
                        d.descriptions.forEach(dd => {
                            descMap[`${dd.classid}_${dd.instanceid}`] = dd.market_hash_name;
                        });
                    }

                    // Группируем скины по названию
                    const groupMap = {};
                    d.assets.forEach(a => {
                        const name = descMap[`${a.classid}_${a.instanceid}`] || `Скин #${a.assetid}`;
                        if (!groupMap[name]) {
                            groupMap[name] = { name, assetIds: [], price: null, selectedQty: 0 };
                        }
                        groupMap[name].assetIds.push(a.assetid);
                    });

                    groupedSkins = Object.values(groupMap);

                    // Загружаем цены
                    for (const g of groupedSkins) {
                        g.price = await fetchPrice(g.name);
                    }

                    renderInventory();
                    document.getElementById('status').style.display = 'none';
                } else {
                    document.getElementById('status').innerHTML = '❌ Инвентарь пуст или скрыт';
                }
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Ошибка загрузки';
            }
        }

        function renderInventory() {
            document.getElementById('inventory').style.display = 'block';
            const container = document.getElementById('skinsList');

            container.innerHTML = groupedSkins.map((g, i) => `
                <div class="skin-item" id="skin-${i}">
                    <div class="skin-info">
                        <div class="skin-name">🎨 ${g.name}</div>
                        <div class="skin-count">В наличии: ${g.assetIds.length} шт.</div>
                        <div class="qty-selector">
                            <button class="qty-btn" onclick="changeQty(${i}, -1)" ${g.selectedQty <= 0 ? 'disabled' : ''}>−</button>
                            <span class="qty-value">${g.selectedQty}</span>
                            <button class="qty-btn" onclick="changeQty(${i}, 1)" ${g.selectedQty >= g.assetIds.length ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div class="skin-our">${g.price ? g.price.toFixed(2) + ' ₽' : '—'}</div>
                        ${g.selectedQty > 0 ? `<div style="color: var(--green); font-size: 11px;">=${(g.price * g.selectedQty).toFixed(2)} ₽</div>` : ''}
                    </div>
                </div>
            `).join('');

            updateSellButton();
        }

        function changeQty(i, delta) {
            const g = groupedSkins[i];
            g.selectedQty = Math.max(0, Math.min(g.assetIds.length, g.selectedQty + delta));
            renderInventory();
        }

        function getSelectedItems() {
            const result = [];
            groupedSkins.forEach(g => {
                if (g.selectedQty > 0 && g.price !== null) {
                    for (let j = 0; j < g.selectedQty; j++) {
                        result.push({
                            assetId: g.assetIds[j],
                            name: g.name,
                            price: g.price
                        });
                    }
                }
            });
            return result;
        }

        function updateSellButton() {
            const sel = getSelectedItems();
            document.getElementById('sellCount').textContent = sel.length;
            document.getElementById('sellBtn').disabled = sel.length === 0;
        }

        function sellSelected() {
            const sel = getSelectedItems();
            if (sel.length === 0) return;
            const total = sel.reduce((sum, s) => sum + s.price, 0).toFixed(2);
            tg.showPopup({
                title: 'Подтверждение',
                message: `Продать ${sel.length} скинов за ${total} ₽?`,
                buttons: [{id: 'ok', type: 'ok', text: 'Продать'}, {type: 'cancel'}]
            }, (btn) => {
                if (btn === 'ok') {
                    tg.sendData(JSON.stringify({
                        action: 'sell',
                        steamId: steamId,
                        skins: sel
                    }));
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('status').innerHTML = '✅ Заявка отправлена!';
                    document.getElementById('status').style.color = '#4ecca3';
                }
            });
        }
    </script>
</body>
</html>
