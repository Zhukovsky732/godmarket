<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GodMarket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --accent: #e94560;
            --green: #4ecca3;
            --text: #eee;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            max-width: 420px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .logo { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
        .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .btn-steam { background: #2a475e; color: #c7d5e0; }
        .btn-logout { background: #333; color: #aaa; }
        .btn-refresh { background: #1e3a5f; color: #8ab4f8; }
        .btn-sell-all {
            background: var(--accent);
            color: white;
            font-size: 15px;
            padding: 14px;
            margin-top: 12px;
            position: sticky;
            bottom: 12px;
            box-shadow: 0 4px 20px rgba(233,69,96,0.4);
        }
        .btn-sell-all:disabled { background: #555; box-shadow: none; opacity: 0.6; }
        .user-info {
            text-align: center;
            color: var(--green);
            font-size: 11px;
            margin-bottom: 12px;
            background: rgba(78,204,163,0.1);
            padding: 6px;
            border-radius: 8px;
        }
        .skin-item {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--accent);
            transition: all 0.2s;
        }
        .skin-item.selected { border-left-color: var(--green); background: #1a2a2a; }
        .skin-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--green);
            cursor: pointer;
            flex-shrink: 0;
        }
        .skin-info { flex: 1; min-width: 0; }
        .skin-name {
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .skin-market { color: var(--muted); font-size: 11px; margin-top: 2px; }
        .skin-our {
            font-weight: 700;
            color: var(--green);
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status {
            text-align: center;
            padding: 30px 20px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎮 GodMarket</div>
        <div class="subtitle">Мгновенный выкуп скинов CS2</div>
    </div>

    <div id="userInfo" class="user-info" style="display:none;"></div>

    <div class="toolbar">
        <button class="btn btn-steam" id="loginBtn" onclick="login()">🔐 Steam</button>
        <button class="btn btn-logout" id="logoutBtn" style="display:none;" onclick="logout()">🚪</button>
        <button class="btn btn-refresh" id="refreshBtn" style="display:none;" onclick="refresh()">🔄</button>
    </div>

    <div id="inventory" style="display:none;">
        <div id="skinsList"></div>
        <button class="btn btn-sell-all" id="sellBtn" onclick="sellSelected()" disabled>
            💰 Продать выбранное (<span id="sellCount">0</span>)
        </button>
    </div>

    <div id="status" class="status">🔐 Войди через Steam</div>

    <script>
        const API = 'https://attendant-esophagus-expand.ngrok-free.dev';
        const H = { 'ngrok-skip-browser-warning': 'true' };

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f0f1a');
        tg.setBackgroundColor('#0f0f1a');

        let steamId = null;
        let allSkins = [];
        let priceCache = {};

        const saved = localStorage.getItem('gm_steamid');
        if (saved) { steamId = saved; showUI(); loadInventory(); }

        function showUI() {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('refreshBtn').style.display = 'inline-block';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userInfo').innerHTML = '🟢 ' + steamId;
        }

        function hideUI() {
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('refreshBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('inventory').style.display = 'none';
        }

        function login() {
            const id = prompt('Steam ID64:', steamId || '');
            if (id && id.length === 17) {
                steamId = id;
                localStorage.setItem('gm_steamid', id);
                showUI();
                loadInventory();
            }
        }

        function logout() {
            localStorage.removeItem('gm_steamid');
            steamId = null;
            allSkins = [];
            priceCache = {};
            hideUI();
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').innerHTML = '🔐 Войди через Steam';
        }

        function refresh() { priceCache = {}; loadInventory(); }

        async function fetchPrice(name) {
            if (priceCache[name]) return priceCache[name];
            try {
                const r = await fetch(`${API}/api/price?name=${encodeURIComponent(name)}`, { headers: H });
                const d = await r.json();
                if (d.success) {
                    priceCache[name] = { avg: d.avg_price, buy: d.buy_price };
                    return priceCache[name];
                }
            } catch(e) {}
            return null;
        }

        async function loadInventory() {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').innerHTML = '⏳ Загрузка...';
            try {
                const r = await fetch(`${API}/api/inventory?steamid=${steamId}`, { headers: H });
                const d = await r.json();
                if (d.success && d.assets) {
                    const descMap = {};
                    if (d.descriptions) {
                        d.descriptions.forEach(dd => {
                            descMap[`${dd.classid}_${dd.instanceid}`] = dd.market_hash_name;
                        });
                    }
                    allSkins = d.assets.slice(0, 20).map(a => ({
                        assetId: a.assetid,
                        classId: a.classid,
                        instanceId: a.instanceid,
                        name: descMap[`${a.classid}_${a.instanceid}`] || `Скин #${a.assetid}`,
                        price: null
                    }));
                    await renderInventory();
                    document.getElementById('status').style.display = 'none';
                } else {
                    document.getElementById('status').innerHTML = '❌ Инвентарь пуст или скрыт';
                }
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Ошибка загрузки';
            }
        }

        async function renderInventory() {
            document.getElementById('inventory').style.display = 'block';
            const container = document.getElementById('skinsList');
            container.innerHTML = '<div class="status">⏳ Считаем цены...</div>';

            for (const skin of allSkins) {
                if (!skin.price) {
                    const p = await fetchPrice(skin.name);
                    skin.price = p ? p.buy : null;
                    skin.avgPrice = p ? p.avg : null;
                }
            }

            container.innerHTML = allSkins.map((s, i) => `
                <div class="skin-item" id="skin-${i}" onclick="toggleSkin(${i})">
                    <input type="checkbox" class="skin-checkbox" id="cb-${i}" onclick="event.stopPropagation(); toggleSkin(${i})">
                    <div class="skin-info">
                        <div class="skin-name">${s.name}</div>
                        <div class="skin-market">Рынок: ${s.avgPrice ? s.avgPrice.toFixed(2) + ' ₽' : '—'}</div>
                    </div>
                    <div class="skin-our">${s.price ? s.price.toFixed(2) + ' ₽' : '—'}</div>
                </div>
            `).join('');
            updateSellButton();
        }

        function toggleSkin(i) {
            const el = document.getElementById('skin-' + i);
            const cb = document.getElementById('cb-' + i);
            el.classList.toggle('selected');
            cb.checked = el.classList.contains('selected');
            updateSellButton();
        }

        function getSelected() {
            return allSkins.filter((s, i) => {
                const el = document.getElementById('skin-' + i);
                return el && el.classList.contains('selected') && s.price !== null;
            });
        }

        function updateSellButton() {
            const sel = getSelected();
            document.getElementById('sellCount').textContent = sel.length;
            document.getElementById('sellBtn').disabled = sel.length === 0;
        }

        function sellSelected() {
            const sel = getSelected();
            if (sel.length === 0) return;
            const total = sel.reduce((sum, s) => sum + s.price, 0).toFixed(2);
            tg.showPopup({
                title: 'Подтверждение',
                message: `Продать ${sel.length} скинов за ${total} ₽?`,
                buttons: [{id: 'ok', type: 'ok', text: 'Продать'}, {type: 'cancel'}]
            }, async (btn) => {
                if (btn === 'ok') {
                    tg.sendData(JSON.stringify({
                        action: 'sell',
                        steamId: steamId,
                        skins: sel.map(s => ({
                            assetId: s.assetId,
                            name: s.name,
                            price: s.price
                        }))
                    }));
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('status').innerHTML = '✅ Заявка отправлена!';
                    document.getElementById('status').style.color = '#4ecca3';
                }
            });
        }
    </script>
</body>
</html>
