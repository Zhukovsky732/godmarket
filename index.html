<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GodMarket - Продать скины</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .logo { text-align: center; font-size: 28px; font-weight: bold; margin: 30px 0 10px; color: #e94560; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .btn {
            display: block; width: 100%; padding: 14px; margin: 10px 0;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-align: center; transition: all 0.3s;
        }
        .btn-steam { background: #2a475e; color: #c7d5e0; }
        .btn-steam:hover { background: #3d6a8e; }
        .btn-sell { background: #e94560; color: white; }
        .btn-sell:hover { background: #ff6b81; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #inventory { margin-top: 20px; }
        .skin-item {
            background: #16213e; border-radius: 8px; padding: 12px;
            margin: 8px 0; display: flex; justify-content: space-between;
            align-items: center; border-left: 4px solid #e94560;
        }
        .skin-info { flex: 1; }
        .skin-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .skin-price { color: #aaa; font-size: 12px; }
        .skin-buy { font-weight: bold; color: #4ecca3; }
        .status { text-align: center; padding: 20px; color: #aaa; }
        .error { color: #e94560; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="logo">🎮 GodMarket</div>
    <div class="subtitle">Продай скины быстро и выгодно</div>

    <button class="btn btn-steam" id="loginBtn" onclick="loginSteam()">🔐 Войти через Steam</button>

    <div id="inventory" style="display:none;">
        <div id="skinsList"></div>
        <button class="btn btn-sell" id="sellAllBtn" onclick="sellAll()" style="display:none;">💰 Продать всё</button>
    </div>

    <div id="status" class="status">Войди через Steam, чтобы увидеть свои скины</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#1a1a2e');

        let userSteamId = null;
        let userInventory = [];

        function loginSteam() {
            const steamId = prompt('Введи свой Steam ID64 (временно):', '7656119XXXXXXXXXX');
            if (steamId && steamId.length === 17) {
                userSteamId = steamId;
                loadInventory();
            } else {
                alert('Неверный Steam ID. Должен быть 17 цифр.');
            }
        }

        async function loadInventory() {
            document.getElementById('status').innerHTML = '⏳ Загружаю инвентарь...';
            document.getElementById('status').className = 'status';

            try {
                // Запрашиваем через наш сервер (избегаем CORS)
                const url = `/api/inventory?steamid=${userSteamId}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.success && data.assets && data.assets.length > 0) {
                    userInventory = data.assets;
                    displayInventory();
                    document.getElementById('status').style.display = 'none';
                } else {
                    document.getElementById('status').innerHTML = '❌ Инвентарь пуст или скрыт.';
                    document.getElementById('status').className = 'error';
                }
            } catch (e) {
                document.getElementById('status').innerHTML = '❌ Ошибка загрузки инвентаря.';
                document.getElementById('status').className = 'error';
            }
        }

        function displayInventory() {
            document.getElementById('inventory').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('sellAllBtn').style.display = 'block';

            const container = document.getElementById('skinsList');
            container.innerHTML = userInventory.slice(0, 10).map((item, index) => {
                const marketPrice = (Math.random() * 5000 + 100).toFixed(2);
                const buyPrice = (marketPrice * 0.80).toFixed(2);
                return `
                    <div class="skin-item">
                        <div class="skin-info">
                            <div class="skin-name">🎨 Скин #${item.assetid}</div>
                            <div class="skin-price">Рынок: ${marketPrice} ₽</div>
                        </div>
                        <div class="skin-buy">Выкуп: ${buyPrice} ₽</div>
                    </div>
                `;
            }).join('');
        }

        function sellAll() {
            tg.showPopup({
                title: 'Продажа скинов',
                message: 'Эта функция появится позже. Мы работаем над этим!',
                buttons: [{type: 'ok'}]
            });
        }
    </script>
</body>
</html>
